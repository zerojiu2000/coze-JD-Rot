<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>求职雷达 · AI求职助手</title>
  <!-- API Key 和 Bot ID 已移至服务端代理（Vercel 环境变量），前端不再暴露 -->
  <style>
    :root {
      --bg-a: #0f0f1a;
      --bg-b: #1a1a2e;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.1);
      --grad-from: #6c63ff;
      --grad-to: #3b82f6;
      --input-bg: #1e1e30;
      --text: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.45);
      --radius: 14px;
      --radius-sm: 10px;
      --font: "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --mono: "JetBrains Mono", "SF Mono", "Consolas", "PingFang SC", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      color: var(--text);
      line-height: 1.6;
      background: linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 55%, #141428 100%);
      background-attachment: fixed;
    }

    /* 细噪点，偏 Linear / Notion 质感 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* 加载：自下而上淡入 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reveal {
      opacity: 0;
      animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: var(--enter-delay, 0s);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.5rem;
      margin: 1rem 1.25rem 0;
      max-width: 1120px;
      width: calc(100% - 2.5rem);
      align-self: center;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .topbar-logo span.emoji {
      font-size: 1.15rem;
      filter: drop-shadow(0 0 12px rgba(108, 99, 255, 0.45));
    }

    .topbar-tag {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
      letter-spacing: 0.04em;
      background: rgba(108, 99, 255, 0.2);
      border: 1px solid #6c63ff;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .main-layout {
      flex: 1;
      display: flex;
      gap: 1.25rem;
      max-width: 1120px;
      width: 100%;
      margin: 1rem auto 0;
      padding: 0 1.25rem 1.5rem;
      align-self: center;
    }

    @media (max-width: 820px) {
      .main-layout {
        flex-direction: column;
      }

      .tools {
        flex-direction: column;
        width: 100%;
        min-width: 0;
        position: static;
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding-bottom: 1.1rem;
      }
    }

    .tools {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-width: 200px;
      padding: 1rem;
      height: fit-content;
      position: sticky;
      top: 1rem;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tools-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      padding: 0 0.35rem;
    }

    .tool-btn {
      padding: 0.75rem 0.85rem;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      transition:
        color 0.2s,
        background 0.2s,
        border-color 0.2s,
        box-shadow 0.2s;
    }

    .tool-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .tool-btn.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: inset 3px 0 0 0 #6c63ff;
    }

    .content-column {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .page-header {
      padding: 1.75rem 1.5rem;
      text-align: left;
    }

    .page-header h1 {
      margin: 0 0 0.5rem;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.2;
    }

    @media (max-width: 520px) {
      .page-header h1 {
        font-size: 1.75rem;
      }
    }

    .page-header p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--text-dim);
      font-weight: 450;
      max-width: 52ch;
    }

    .panel {
      display: none;
      padding: 1.5rem;
      margin-bottom: 0;
    }

    .panel.visible {
      display: block;
    }

    .panel h2 {
      margin: 0 0 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: -0.01em;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    label + textarea,
    label + input {
      margin-bottom: 1rem;
    }

    textarea,
    input[type="text"] {
      width: 100%;
      padding: 0.8rem 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--input-bg);
      resize: vertical;
      min-height: 44px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea {
      min-height: 110px;
    }

    textarea::placeholder,
    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.32);
    }

    textarea:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: rgba(167, 139, 250, 0.65);
      box-shadow:
        0 0 0 1px rgba(108, 99, 255, 0.35),
        0 0 20px rgba(108, 99, 255, 0.22);
    }

    .actions {
      margin-top: 0.35rem;
    }

    .btn-primary {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      padding: 0.72rem 1.75rem;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #6c63ff, #3b82f6);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: transform 0.15s, box-shadow 0.25s, filter 0.2s;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.25);
    }

    .btn-primary:hover {
      box-shadow: 0 0 20px rgba(108, 99, 255, 0.5);
      filter: brightness(1.06);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      filter: none;
      box-shadow: none;
    }

    .result-section {
      padding: 1.35rem 1.5rem 1.5rem;
    }

    .result-section h3 {
      margin: 0 0 0.85rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-muted);
    }

    .result-code {
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.65;
      background: rgba(108, 99, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-left: 3px solid #6c63ff;
      border-radius: var(--radius-sm);
      padding: 1rem 1.1rem;
      min-height: 5rem;
      color: #fff;
    }

    .result-placeholder {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.82rem;
      margin: 0;
    }

    .result-body {
      white-space: pre-wrap;
      word-break: break-word;
      color: #fff;
    }

    .result-body strong {
      color: #fff;
      font-weight: 600;
    }

    .result-body em {
      color: rgba(255, 255, 255, 0.85);
      font-style: normal;
    }

    .result-body p {
      margin: 0 0 0.65rem;
    }

    .result-body p:last-child {
      margin-bottom: 0;
    }

    .loading {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.85rem;
      animation: pulse 1.1s ease-in-out infinite;
    }

    .result-hint {
      margin: 0.75rem 0 0;
      font-size: 0.78rem;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.55);
    }

    .result-hint code {
      font-size: 0.76rem;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.35);
      color: rgba(255, 255, 255, 0.88);
    }

    @keyframes pulse {
      50% {
        opacity: 0.55;
      }
    }

    .site-footer {
      text-align: center;
      padding: 1rem 1.25rem 1.75rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar glass reveal" style="--enter-delay: 0.05s">
      <div class="topbar-logo" aria-label="产品名称">
        <span class="emoji" aria-hidden="true">🎯</span>
        求职雷达
      </div>
      <div class="topbar-tag">AI驱动 · 专为转行者</div>
    </header>

    <div class="main-layout">
      <aside class="tools glass reveal" role="tablist" aria-label="功能选择" style="--enter-delay: 0.12s">
        <div class="tools-label">功能</div>
        <button type="button" class="tool-btn active" data-mode="jd" role="tab" aria-selected="true">JD匹配度评分</button>
        <button type="button" class="tool-btn" data-mode="gap" role="tab" aria-selected="false">简历差距分析</button>
        <button type="button" class="tool-btn" data-mode="hello" role="tab" aria-selected="false">打招呼话术生成</button>
        <button type="button" class="tool-btn" data-mode="interview" role="tab" aria-selected="false">面试题预测</button>
      </aside>

      <div class="content-column">
        <header class="page-header glass reveal" style="--enter-delay: 0.18s">
          <h1>求职雷达·AI求职助手</h1>
          <p>专为转行者设计 · AI全程陪跑</p>
        </header>

        <section id="panel-jd" class="panel glass visible reveal" role="tabpanel" aria-labelledby="tab-jd" style="--enter-delay: 0.24s">
          <h2>JD 与简历匹配度</h2>
          <label for="jd-text">职位描述（JD）</label>
          <textarea id="jd-text" placeholder="粘贴招聘JD内容，例如：招聘AI产品经理，要求..."></textarea>
          <label for="resume-summary">你的简历要点 / 经历摘要</label>
          <textarea id="resume-summary" placeholder="填写你的背景，例如：5年客户运营，做过Coze智能体..."></textarea>
          <div class="actions">
            <button type="button" class="btn-primary" id="analyze-jd">开始分析</button>
          </div>
        </section>

        <section id="panel-gap" class="panel glass" role="tabpanel" hidden style="--enter-delay: 0.24s">
          <h2>简历与目标岗位差距</h2>
          <label for="target-jd">目标岗位 JD</label>
          <textarea id="target-jd" placeholder="粘贴招聘JD内容，例如：招聘AI产品经理，要求..."></textarea>
          <label for="current-resume">当前简历内容</label>
          <textarea id="current-resume" placeholder="填写你的背景，例如：5年客户运营，做过Coze智能体..."></textarea>
          <div class="actions">
            <button type="button" class="btn-primary" id="analyze-gap">开始分析</button>
          </div>
        </section>

        <section id="panel-hello" class="panel glass" role="tabpanel" hidden style="--enter-delay: 0.24s">
          <h2>打招呼 / 投递话术</h2>
          <label for="hello-company">公司与岗位（可选）</label>
          <input type="text" id="hello-company" placeholder="例如：某某科技 · 前端工程师" />
          <label for="hello-highlights">你的亮点 / 匹配点</label>
          <textarea id="hello-highlights" placeholder="技能栈、项目成果、与 JD 的契合点…"></textarea>
          <div class="actions">
            <button type="button" class="btn-primary" id="analyze-hello">开始分析</button>
          </div>
        </section>

        <section id="panel-interview" class="panel glass" role="tabpanel" hidden style="--enter-delay: 0.24s">
          <h2>面试题预测</h2>
          <label for="interview-jd">岗位 JD 或技术栈关键词</label>
          <textarea id="interview-jd" placeholder="粘贴招聘JD内容，例如：招聘AI产品经理，要求..."></textarea>
          <div class="actions">
            <button type="button" class="btn-primary" id="analyze-interview">开始分析</button>
          </div>
        </section>

        <section class="result-section glass reveal" aria-live="polite" style="--enter-delay: 0.32s">
          <h3>分析结果</h3>
          <div class="result-code">
            <p class="result-placeholder" id="result-empty">选择功能并点击「开始分析」后，结果将显示在这里。</p>
            <div class="result-body" id="result-content" hidden></div>
          </div>
        </section>
      </div>
    </div>

    <footer class="site-footer reveal" style="--enter-delay: 0.4s">由 Coze AI 驱动 · 独立设计开发</footer>
  </div>

  <script>
    (function () {
      var PROXY_URL = "/api/coze-proxy";

      var mode = "jd";
      var panels = {
        jd: document.getElementById("panel-jd"),
        gap: document.getElementById("panel-gap"),
        hello: document.getElementById("panel-hello"),
        interview: document.getElementById("panel-interview")
      };
      var toolBtns = document.querySelectorAll(".tool-btn");
      var resultEmpty = document.getElementById("result-empty");
      var resultContent = document.getElementById("result-content");

      function setMode(next) {
        mode = next;
        toolBtns.forEach(function (btn) {
          var active = btn.getAttribute("data-mode") === next;
          btn.classList.toggle("active", active);
          btn.setAttribute("aria-selected", active ? "true" : "false");
        });
        Object.keys(panels).forEach(function (key) {
          var el = panels[key];
          var show = key === next;
          el.classList.toggle("visible", show);
          el.hidden = !show;
        });
      }

      toolBtns.forEach(function (btn) {
        btn.addEventListener("click", function () {
          setMode(btn.getAttribute("data-mode"));
        });
      });

      function showResult(html) {
        resultEmpty.hidden = true;
        resultContent.hidden = false;
        resultContent.innerHTML = html;
      }

      function showResultPlain(text) {
        resultEmpty.hidden = true;
        resultContent.hidden = false;
        resultContent.textContent = text;
      }

      function showLoading() {
        resultEmpty.hidden = true;
        resultContent.hidden = false;
        resultContent.innerHTML = '<p class="loading">正在分析中…</p>';
      }

      function showApiFailure() {
        showResult("<p>分析失败，请重试</p>");
      }

      function escapeHtml(s) {
        var div = document.createElement("div");
        div.textContent = s == null ? "" : String(s);
        return div.innerHTML;
      }

      /* 通过服务端代理调用 Coze，前端只发送 {query} */
      function runCoze(userContent) {
        showLoading();
        fetch(PROXY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: userContent })
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.error) {
              showResult(
                "<p>分析失败，请重试</p>" +
                "<p class=\"result-hint\">" + escapeHtml(data.error) + "</p>"
              );
              return;
            }
            showResultPlain(data.text || "（未获取到回复）");
          })
          .catch(function () {
            showResult(
              "<p>分析失败，请重试</p>" +
              "<p class=\"result-hint\">网络请求失败，请检查网络连接后重试。</p>"
            );
          });
      }

      document.getElementById("analyze-jd").addEventListener("click", function () {
        var jd = document.getElementById("jd-text").value.trim();
        var resume = document.getElementById("resume-summary").value.trim();
        if (!jd || !resume) {
          showResult("<p>请同时填写 <strong>JD</strong> 与 <strong>简历要点</strong>。</p>");
          return;
        }
        runCoze(
          "【任务：JD匹配度评分】\n\n【职位描述 JD】\n" +
            jd +
            "\n\n【我的简历要点】\n" +
            resume +
            "\n\n请根据以上信息给出匹配度分析与改进建议。"
        );
      });

      document.getElementById("analyze-gap").addEventListener("click", function () {
        var jd = document.getElementById("target-jd").value.trim();
        var resume = document.getElementById("current-resume").value.trim();
        if (!jd || !resume) {
          showResult("<p>请填写 <strong>目标 JD</strong> 与 <strong>当前简历</strong>。</p>");
          return;
        }
        runCoze(
          "【任务：简历差距分析】\n\n【目标岗位 JD】\n" +
            jd +
            "\n\n【当前简历】\n" +
            resume +
            "\n\n请分析简历与 JD 的差距并给出可执行的修改方向。"
        );
      });

      document.getElementById("analyze-hello").addEventListener("click", function () {
        var company = document.getElementById("hello-company").value.trim();
        var highlights = document.getElementById("hello-highlights").value.trim();
        if (!highlights) {
          showResult("<p>请至少填写 <strong>亮点 / 匹配点</strong>。</p>");
          return;
        }
        runCoze(
          "【任务：打招呼 / 投递话术生成】\n\n【公司与岗位（可选）】\n" +
            (company || "（未填写）") +
            "\n\n【我的亮点与匹配点】\n" +
            highlights +
            "\n\n请生成简洁、真诚、非群发的打招呼或投递话术。"
        );
      });

      document.getElementById("analyze-interview").addEventListener("click", function () {
        var jd = document.getElementById("interview-jd").value.trim();
        if (!jd) {
          showResult("<p>请填写 <strong>JD 或关键词</strong>。</p>");
          return;
        }
        runCoze(
          "【任务：面试题预测】\n\n【岗位 JD 或关键词】\n" +
            jd +
            "\n\n请预测可能被问到的面试题，并简要说明考察点。"
        );
      });

      setMode("jd");
    })();
  </script>
</body>
</html>
