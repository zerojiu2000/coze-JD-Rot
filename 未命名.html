<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>求职雷达 · AI求职助手</title>
  <!-- API Key 和 Bot ID 已移至服务端代理（Vercel 环境变量），前端不再暴露 -->
  <style>
    :root {
      --bg-a: #0f0f1a;
      --bg-b: #1a1a2e;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.1);
      --grad-from: #6c63ff;
      --grad-to: #3b82f6;
      --input-bg: #1e1e30;
      --text: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.45);
      --radius: 14px;
      --radius-sm: 10px;
      --font: "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --mono: "JetBrains Mono", "SF Mono", "Consolas", "PingFang SC", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100%;
      font-family: var(--font);
      color: var(--text);
      line-height: 1.6;
      background: linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 55%, #141428 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /* 细噪点，偏 Linear / Notion 质感 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      z-index: -1;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      transition: all 0.3s ease;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      padding-bottom: 2rem;
    }

    /* 加载：自下而上淡入 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reveal {
      opacity: 0;
      animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: var(--enter-delay, 0s);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.5rem;
      margin: 1rem auto 0;
      max-width: 1120px;
      width: calc(100% - 2.5rem);
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .topbar-logo span.emoji {
      font-size: 1.15rem;
      filter: drop-shadow(0 0 12px rgba(108, 99, 255, 0.45));
    }

    .topbar-tag {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
      letter-spacing: 0.04em;
      background: rgba(108, 99, 255, 0.2);
      border: 1px solid #6c63ff;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .main-layout {
      flex: 1;
      display: flex;
      gap: 1.25rem;
      max-width: 1120px;
      width: 100%;
      margin: 1rem auto 0;
      padding: 0 1.25rem;
    }

    @media (max-width: 820px) {
      .main-layout {
        flex-direction: column;
      }

      .tools {
        flex-direction: column;
        width: 100%;
        min-width: 0;
        position: static;
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding-bottom: 1.1rem;
        margin-bottom: 0.5rem;
      }
    }

    .tools {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-width: 200px;
      padding: 1rem;
      height: fit-content;
      position: sticky;
      top: 1rem;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tools-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      padding: 0 0.35rem;
    }

    .tool-btn {
      padding: 0.75rem 0.85rem;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      transition:
        color 0.2s,
        background 0.2s,
        border-color 0.2s,
        box-shadow 0.2s;
      font-family: inherit;
    }

    .tool-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .tool-btn.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: inset 3px 0 0 0 #6c63ff;
    }

    .content-column {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .page-header {
      padding: 1.75rem 1.5rem;
      text-align: left;
    }

    .page-header h1 {
      margin: 0 0 0.5rem;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.2;
    }

    @media (max-width: 520px) {
      .page-header h1 {
        font-size: 1.75rem;
      }
    }

    .page-header p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--text-dim);
      font-weight: 450;
      max-width: 52ch;
    }

    .panel {
      display: none;
      padding: 1.5rem;
      margin-bottom: 0;
    }

    .panel.visible {
      display: block;
      animation: fadeInUp 0.4s ease forwards;
    }

    .panel h2 {
      margin: 0 0 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: -0.01em;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    label + textarea,
    label + input {
      margin-bottom: 1rem;
    }

    textarea,
    input[type="text"] {
      width: 100%;
      padding: 0.8rem 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--input-bg);
      resize: vertical;
      min-height: 44px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea {
      min-height: 110px;
    }

    textarea::placeholder,
    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.32);
    }

    textarea:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: rgba(167, 139, 250, 0.65);
      box-shadow:
        0 0 0 1px rgba(108, 99, 255, 0.35),
        0 0 20px rgba(108, 99, 255, 0.22);
    }

    .actions {
      margin-top: 0.35rem;
    }

    .btn-primary {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      padding: 0.72rem 1.75rem;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #6c63ff, #3b82f6);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: transform 0.15s, box-shadow 0.25s, filter 0.2s;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.25);
      font-family: inherit;
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(108, 99, 255, 0.5);
      filter: brightness(1.06);
    }

    .btn-primary:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      filter: none;
      box-shadow: none;
    }

    .result-section {
      padding: 1.35rem 1.5rem 1.5rem;
      min-height: 180px;
    }

    .result-section h3 {
      margin: 0 0 0.85rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-muted);
    }

    .result-code {
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.65;
      background: rgba(108, 99, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-left: 3px solid #6c63ff;
      border-radius: var(--radius-sm);
      padding: 1rem 1.1rem;
      min-height: 5rem;
      color: #fff;
    }

    .result-placeholder {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.82rem;
      margin: 0;
    }

    .result-body {
      white-space: pre-wrap;
      word-break: break-word;
      color: #fff;
      min-height: 80px;
    }

    .result-body strong {
      color: #fff;
      font-weight: 600;
    }

    .result-body em {
      color: rgba(255, 255, 255, 0.85);
      font-style: normal;
    }

    .result-body p {
      margin: 0 0 0.65rem;
    }

    .result-body p:last-child {
      margin-bottom: 0;
    }

    .loading {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.85rem;
      animation: pulse 1.1s ease-in-out infinite;
    }

    @keyframes pulse {
      50% {
        opacity: 0.55;
      }
    }

    .result-hint {
      margin: 0.75rem 0 0;
      font-size: 0.78rem;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.55);
    }

    .result-hint code {
      font-size: 0.76rem;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.35);
      color: rgba(255, 255, 255, 0.88);
    }

    .site-footer {
      text-align: center;
      padding: 1rem 1.25rem 1.75rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      margin-top: auto;
    }

    /* 错误提示样式 */
    .error-message {
      color: #f87171;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      display: block;
    }

    /* 加载动画优化 */
    .loading::after {
      content: "";
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar glass reveal" style="--enter-delay: 0.05s">
      <div class="topbar-logo" aria-label="产品名称">
        <span class="emoji" aria-hidden="true">🎯</span>
        求职雷达
      </div>
      <div class="topbar-tag">AI驱动 · 专为转行者</div>
    </header>

    <div class="main-layout">
      <aside class="tools glass reveal" role="tablist" aria-label="功能选择" style="--enter-delay: 0.12s">
        <div class="tools-label">功能</div>
        <button type="button" class="tool-btn active" data-mode="jd" role="tab" aria-selected="true">JD匹配度评分</button>
        <button type="button" class="tool-btn" data-mode="gap" role="tab" aria-selected="false">简历差距分析</button>
        <button type="button" class="tool-btn" data-mode="hello" role="tab" aria-selected="false">打招呼话术生成</button>
        <button type="button" class="tool-btn" data-mode="interview" role="tab" aria-selected="false">面试题预测</button>
      </aside>

      <div class="content-column">
        <header class="page-header glass reveal" style="--enter-delay: 0.18s">
          <h1>求职雷达·AI求职助手</h1>
          <p>专为转行者设计 · AI全程陪跑</p>
        </header>

        <section id="panel-jd" class="panel glass visible reveal" role="tabpanel" aria-labelledby="tab-jd" style="--enter-delay: 0.24s">
          <h2>JD 与简历匹配度</h2>
          <label for="jd-text">职位描述（JD）</label>
          <textarea id="jd-text" placeholder="粘贴招聘JD内容，例如：招聘AI产品经理，要求..."></textarea>
          <label for="resume-summary">你的简历要点 / 经历摘要</label>
          <textarea id="resume-summary" placeholder="填写你的背景，例如：5年客户运营，做过Coze智能体..."></textarea>
          <div class="actions">
            <button type="button" class="btn-primary" id="analyze-jd">开始分析</button>
          </div>
        </section>

        <section id="panel-gap" class="panel glass" role="tabpanel" hidden style="--enter-delay: 0.24s">
          <h2>简历与目标岗位差距</h2>
          <label for="target-jd">目标岗位 JD</label>
          <textarea id="target-jd" placeholder="粘贴招聘JD内容，例如：招聘AI产品经理，要求..."></textarea>
          <label for="current-resume">当前简历内容</label>
          <textarea id="current-resume" placeholder="填写你的背景，例如：5年客户运营，做过Coze智能体..."></textarea>
          <div class="actions">
            <button type="button" class="btn-primary" id="analyze-gap">开始分析</button>
          </div>
        </section>

        <section id="panel-hello" class="panel glass" role="tabpanel" hidden style="--enter-delay: 0.24s">
          <h2>打招呼 / 投递话术</h2>
          <label for="hello-company">公司与岗位（可选）</label>
          <input type="text" id="hello-company" placeholder="例如：某某科技 · 前端工程师" />
          <label for="hello-highlights">你的亮点 / 匹配点</label>
          <textarea id="hello-highlights" placeholder="技能栈、项目成果、与 JD 的契合点…"></textarea>
          <div class="actions">
            <button type="button" class="btn-primary" id="analyze-hello">开始分析</button>
          </div>
        </section>

        <section id="panel-interview" class="panel glass" role="tabpanel" hidden style="--enter-delay: 0.24s">
          <h2>面试题预测</h2>
          <label for="interview-jd">岗位 JD 或技术栈关键词</label>
          <textarea id="interview-jd" placeholder="粘贴招聘JD内容，例如：招聘AI产品经理，要求..."></textarea>
          <div class="actions">
            <button type="button" class="btn-primary" id="analyze-interview">开始分析</button>
          </div>
        </section>

        <section class="result-section glass reveal" aria-live="polite" style="--enter-delay: 0.32s">
          <h3>分析结果</h3>
          <div class="result-code">
            <p class="result-placeholder" id="result-empty">选择功能并点击「开始分析」后，结果将显示在这里。</p>
            <div class="result-body" id="result-content" hidden></div>
          </div>
        </section>
      </div>
    </div>

    <footer class="site-footer reveal" style="--enter-delay: 0.4s">由 Coze AI 驱动 · 独立设计开发</footer>
  </div>

  <script>
    (function () {
      // 配置项
      const CONFIG = {
        PROXY_URL: "/api/coze",
        DEFAULT_MODE: "jd",
        REQUEST_TIMEOUT: 30000 // 请求超时时间 30秒
      };

      // DOM 元素缓存
      const elements = {
        panels: {
          jd: document.getElementById("panel-jd"),
          gap: document.getElementById("panel-gap"),
          hello: document.getElementById("panel-hello"),
          interview: document.getElementById("panel-interview")
        },
        toolBtns: document.querySelectorAll(".tool-btn"),
        resultEmpty: document.getElementById("result-empty"),
        resultContent: document.getElementById("result-content"),
        buttons: {
          jd: document.getElementById("analyze-jd"),
          gap: document.getElementById("analyze-gap"),
          hello: document.getElementById("analyze-hello"),
          interview: document.getElementById("analyze-interview")
        }
      };

      let currentMode = CONFIG.DEFAULT_MODE;
      let activeRequest = null; // 跟踪当前活跃的请求

      // 设置当前功能模式
      function setMode(nextMode) {
        currentMode = nextMode;
        
        // 更新按钮状态
        elements.toolBtns.forEach(btn => {
          const isActive = btn.dataset.mode === nextMode;
          btn.classList.toggle("active", isActive);
          btn.setAttribute("aria-selected", isActive);
        });

        // 更新面板显示
        Object.keys(elements.panels).forEach(key => {
          const panel = elements.panels[key];
          const isVisible = key === nextMode;
          panel.classList.toggle("visible", isVisible);
          panel.hidden = !isVisible;
        });

        // 清空结果区域
        resetResult();
      }

      // 重置结果区域
      function resetResult() {
        elements.resultEmpty.hidden = false;
        elements.resultContent.hidden = true;
        elements.resultContent.innerHTML = "";
      }

      // 显示结果（HTML）
      function showResult(html) {
        elements.resultEmpty.hidden = true;
        elements.resultContent.hidden = false;
        elements.resultContent.innerHTML = html;
      }

      // 显示纯文本结果
      function showResultPlain(text) {
        elements.resultEmpty.hidden = true;
        elements.resultContent.hidden = false;
        elements.resultContent.textContent = text || "（未获取到回复）";
      }

      // 显示加载状态
      function showLoading() {
        elements.resultEmpty.hidden = true;
        elements.resultContent.hidden = false;
        elements.resultContent.innerHTML = '<p class="loading">正在分析中</p>';
      }

      // 显示API错误
      function showApiError(message, details = "") {
        let html = `<p>${message}</p>`;
        if (details) {
          html += `<p class="result-hint">${escapeHtml(details)}</p>`;
        }
        showResult(html);
      }

      // HTML转义
      function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      // 禁用/启用按钮
      function setButtonState(buttonId, disabled) {
        const btn = elements.buttons[buttonId];
        if (btn) {
          btn.disabled = disabled;
          btn.textContent = disabled ? "分析中..." : "开始分析";
        }
      }

      // 取消当前活跃的请求
      function cancelActiveRequest() {
        if (activeRequest) {
          activeRequest.abort();
          activeRequest = null;
        }
      }

      // 调用Coze API
      function runCoze(prompt, buttonId) {
        // 取消之前的请求
        cancelActiveRequest();
        
        // 显示加载状态
        showLoading();
        
        // 禁用按钮
        setButtonState(buttonId, true);

        // 创建AbortController用于超时控制
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), CONFIG.REQUEST_TIMEOUT);
        activeRequest = controller;

        fetch(CONFIG.PROXY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
          signal: controller.signal
        })
          .then(response => {
            clearTimeout(timeoutId);
            if (!response.ok) {
              throw new Error(`HTTP错误：${response.status}`);
            }
            return response.json();
          })
          .then(data => {
            if (data.error) {
              showApiError("分析失败，请重试", data.error);
            } else {
              showResultPlain(data.text);
            }
          })
          .catch(error => {
            clearTimeout(timeoutId);
            if (error.name === "AbortError") {
              showApiError("请求超时，请重试", "请求超过30秒未响应，请检查网络或稍后再试。");
            } else {
              showApiError("分析失败，请重试", "网络请求失败，请检查网络连接后重试。");
            }
          })
          .finally(() => {
            // 恢复按钮状态
            setButtonState(buttonId, false);
            activeRequest = null;
          });
      }

      // 绑定工具按钮事件
      elements.toolBtns.forEach(btn => {
        btn.addEventListener("click", () => setMode(btn.dataset.mode));
      });

      // JD匹配度分析
      elements.buttons.jd.addEventListener("click", () => {
        const jd = document.getElementById("jd-text").value.trim();
        const resume = document.getElementById("resume-summary").value.trim();
        
        if (!jd || !resume) {
          showResult("<p>请同时填写 <strong>JD</strong> 与 <strong>简历要点</strong>。</p>");
          return;
        }

        const prompt = `【任务：JD匹配度评分】

【职位描述 JD】
${jd}

【我的简历要点】
${resume}

请根据以上信息给出匹配度分析（0-100分），并详细说明匹配的优势和不足，最后给出针对性的改进建议。`;

        runCoze(prompt, "jd");
      });

      // 简历差距分析
      elements.buttons.gap.addEventListener("click", () => {
        const jd = document.getElementById("target-jd").value.trim();
        const resume = document.getElementById("current-resume").value.trim();
        
        if (!jd || !resume) {
          showResult("<p>请填写 <strong>目标 JD</strong> 与 <strong>当前简历</strong>。</p>");
          return;
        }

        const prompt = `【任务：简历差距分析】

【目标岗位 JD】
${jd}

【当前简历】
${resume}

请详细分析简历与目标JD的核心差距，按优先级列出缺失的技能/经验，并给出可执行的简历修改方向和补充建议。`;

        runCoze(prompt, "gap");
      });

      // 打招呼话术生成
      elements.buttons.hello.addEventListener("click", () => {
        const company = document.getElementById("hello-company").value.trim();
        const highlights = document.getElementById("hello-highlights").value.trim();
        
        if (!highlights) {
          showResult("<p>请至少填写 <strong>亮点 / 匹配点</strong>。</p>");
          return;
        }

        const prompt = `【任务：打招呼 / 投递话术生成】

【公司与岗位（可选）】
${company || "（未填写）"}

【我的亮点与匹配点】
${highlights}

请生成3个不同风格的打招呼/投递话术，要求：
1. 简洁真诚，非群发感
2. 突出核心匹配点
3. 语气自然，适合职场沟通
4. 每个话术控制在50-80字`;

        runCoze(prompt, "hello");
      });

      // 面试题预测
      elements.buttons.interview.addEventListener("click", () => {
        const jd = document.getElementById("interview-jd").value.trim();
        
        if (!jd) {
          showResult("<p>请填写 <strong>JD 或关键词</strong>。</p>");
          return;
        }

        const prompt = `【任务：面试题预测】

【岗位 JD 或关键词】
${jd}

请基于JD内容预测10个高频面试题，按以下分类：
1. 基础能力题（3题）
2. 专业技能题（5题）
3. 场景/项目题（2题）
每题简要说明考察重点，并给出回答思路提示。`;

        runCoze(prompt, "interview");
      });

      // 初始化默认模式
      setMode(CONFIG.DEFAULT_MODE);

      // 响应式调整：窗口大小变化时重新计算布局
      window.addEventListener("resize", () => {
        // 触发重绘，解决某些情况下的布局错乱
        document.body.style.opacity = "0.99";
        setTimeout(() => {
          document.body.style.opacity = "1";
        }, 50);
      });

      // 键盘快捷键：ESC清空结果
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          resetResult();
        }
      });
    })();
  </script>
</body>
</html>
